<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kupuri Media — Bienvenida</title>
    <style>
        /* ----------------------------------------------------------------
           UNCODIXFY compliance:
           - No backdrop-filter / glassmorphism
           - No gradients
           - Max 12px border-radius
           - System font stack
           - Palette: #050510 bg, #d4af37 ALEX Gold, #8b5cf6 SYNTHIA Violet
           - Spacing: 4/8/12/16/24/32px only
        ---------------------------------------------------------------- */

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #f4f4f5;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ---- Loading screen ------------------------------------------ */
        #loading {
            position: absolute;
            z-index: 30;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #d4af37;
            font-weight: 500;
            transition: opacity 0.4s ease;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ---- Canvas (Bevy renders here) ------------------------------- */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }

        /* ---- Main HUD panel ------------------------------------------ */
        /* Solid dark background — no glassmorphism per uncodixfy */
        #ui-layer {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            z-index: 20;
            text-align: center;
            background: #0d0d1a;
            border: 1px solid #1e1e2e;
            padding: 16px 32px;
            border-radius: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
            min-width: 280px;
        }
        #ui-layer.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #ui-layer h1 {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 600;
            color: #f4f4f5;
            letter-spacing: -0.3px;
        }
        #ui-layer p {
            margin: 0;
            font-size: 13px;
            color: #71717a;
        }

        /* ---- Progress dots ------------------------------------------- */
        #progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3f3f46;
            transition: background 0.3s ease, transform 0.3s ease;
        }
        .dot.active {
            background: #d4af37;
            transform: scale(1.3);
        }
        .dot.done {
            background: #8b5cf6;
        }

        /* ---- Hint text ------------------------------------------------ */
        #hint {
            margin-top: 8px;
            font-size: 11px;
            color: #8b5cf6;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: opacity 0.3s ease;
        }
        #hint.fade-out {
            opacity: 0;
        }

        /* ---- "Continuar" button -------------------------------------- */
        #btn-continuar {
            position: absolute;
            bottom: 32px;
            right: 32px;
            z-index: 25;
            background: #d4af37;
            color: #050510;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 0.3px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
        }
        #btn-continuar.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        #btn-continuar:hover {
            background: #c9a22e;
        }
        #btn-continuar:active {
            background: #b8911f;
        }

        /* ---- Video overlay ------------------------------------------- */
        /* Positioned in the right-center of viewport to overlay the inner page */
        #video-overlay {
            position: absolute;
            top: 50%;
            left: 56%;
            transform: translate(-50%, -50%) scale(0.95);
            width: min(340px, 38vw);
            aspect-ratio: 16 / 9;
            z-index: 15;
            border-radius: 8px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            border: 1px solid #1e1e2e;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #video-overlay.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
        #video-overlay video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ---- Drag affordance indicator (pulsing arrow) --------------- */
        #drag-hint {
            position: absolute;
            top: 50%;
            right: 24px;
            transform: translateY(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            opacity: 0.7;
            transition: opacity 0.4s ease;
            animation: pulse-right 1.8s ease-in-out infinite;
        }
        #drag-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #drag-hint svg {
            width: 24px;
            height: 24px;
            color: #d4af37;
        }
        #drag-hint span {
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #d4af37;
            font-weight: 500;
        }

        @keyframes pulse-right {
            0%, 100% { transform: translateY(-50%) translateX(0); }
            50%       { transform: translateY(-50%) translateX(6px); }
        }
    </style>
</head>
<body>

    <div id="loading">Inicializando Motor 3D…</div>

    <!-- Drag affordance: nudges user to swipe the cover -->
    <div id="drag-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
        <span>Desliza</span>
    </div>

    <!-- Video overlay: shown when cover reaches 50% open (flipbook:video-trigger) -->
    <div id="video-overlay">
        <video
            id="intro-video"
            src=""
            autoplay
            muted
            loop
            playsinline
            preload="auto"
            aria-label="Introducción a Sphere OS">
        </video>
    </div>

    <!-- Stat + identiy HUD -->
    <div id="ui-layer">
        <h1>Bienvenida a Sphere OS™</h1>
        <p id="ui-subtitle">Desliza la portada para explorar tu nueva dimensión.</p>
        <div id="hint">← Arrastra para abrir →</div>
        <div id="progress-dots">
            <div class="dot active" id="dot-0"></div>
            <div class="dot"        id="dot-1"></div>
            <div class="dot"        id="dot-2"></div>
        </div>
    </div>

    <!-- Continue CTA — appears when book is fully open -->
    <button id="btn-continuar" type="button" aria-label="Continuar al dashboard">
        Continuar al Dashboard →
    </button>

    <script type="module">
        import init from './out/onboarding_flipbook.js';

        const loading   = document.getElementById('loading');
        const uiLayer   = document.getElementById('ui-layer');
        const uiSubtitle = document.getElementById('ui-subtitle');
        const hint      = document.getElementById('hint');
        const dragHint  = document.getElementById('drag-hint');
        const videoWrap = document.getElementById('video-overlay');
        const video     = document.getElementById('intro-video');
        const btnCont   = document.getElementById('btn-continuar');
        const dots      = [
            document.getElementById('dot-0'),
            document.getElementById('dot-1'),
            document.getElementById('dot-2'),
        ];

        // Skip onboarding if already completed
        if (localStorage.getItem('kupuri_onboarding_seen') === 'true') {
            window.location.href = '/dashboard';
        }

        // ----------------------------------------------------------------
        // Boot WASM
        // ----------------------------------------------------------------
        init()
            .then(() => {
                loading.classList.add('hidden');
                // Show HUD after Bevy canvas is painted (one rAF delay)
                requestAnimationFrame(() => {
                    uiLayer.classList.add('visible');
                });
            })
            .catch((err) => {
                loading.textContent = 'Error al cargar motor 3D.';
                console.error('[flipbook] WASM init error:', err);
            });

        // ----------------------------------------------------------------
        // flipbook:open  — Bevy fires this every time open fraction changes
        // detail: number 0.0 – 1.0
        // ----------------------------------------------------------------
        let fullyOpenTimer = null;

        document.addEventListener('flipbook:open', (e) => {
            const fraction = e.detail ?? 0;

            // --- Progress dots ---
            if (fraction < 0.1) {
                setDots(0);
                hint.classList.remove('fade-out');
                dragHint.classList.remove('hidden');
                uiSubtitle.textContent = 'Desliza la portada para explorar tu nueva dimensión.';
                btnCont.classList.remove('visible');
                clearTimeout(fullyOpenTimer);
            } else if (fraction < 0.5) {
                setDots(1);
                hint.classList.add('fade-out');
                dragHint.classList.add('hidden');
                uiSubtitle.textContent = 'Descubriendo el universo de agentes IA…';
            } else if (fraction < 0.9) {
                setDots(2);
                uiSubtitle.textContent = 'Tus agentes están listos para trabajar contigo.';
            } else {
                // Fully open — debounce 400ms then show CTA
                clearTimeout(fullyOpenTimer);
                fullyOpenTimer = setTimeout(() => {
                    btnCont.classList.add('visible');
                }, 400);
            }
        });

        // ----------------------------------------------------------------
        // flipbook:video-trigger — show intro video when cover hits 50%+
        // ----------------------------------------------------------------
        document.addEventListener('flipbook:video-trigger', () => {
            videoWrap.classList.add('visible');
            video.play().catch(() => {}); // ignore autoplay block on desktop
        });

        // ----------------------------------------------------------------
        // Continue button
        // ----------------------------------------------------------------
        btnCont.addEventListener('click', () => {
            localStorage.setItem('kupuri_onboarding_seen', 'true');
            // Dispatch for parent shell SPA integration
            window.dispatchEvent(new CustomEvent('onboarding:complete', {
                bubbles: true,
                detail: { ts: Date.now() },
            }));
            // Soft nav — parent app can intercept; fallback here
            if (!window.__kupuri_spa) {
                window.location.href = '/dashboard';
            }
        });

        // ----------------------------------------------------------------
        // Helpers
        // ----------------------------------------------------------------
        function setDots(activeIndex) {
            dots.forEach((dot, i) => {
                dot.classList.toggle('done', i < activeIndex);
                dot.classList.toggle('active', i === activeIndex);
            });
        }
    </script>
</body>
</html>
