<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kupuri Media - Interactive 3D Onboarding</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 
           Following UNCODIXFY rules: 
           - Modern, sleek aesthetics
           - Deep dark mode (#050510 background)
           - Sharp typography
           - Functional UI overlapping the 3D canvas
        */

        #loading {
            position: absolute;
            z-index: 10;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #d4af37; /* ALEX Gold */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 32px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 600;
        }

        p {
            margin: 0;
            font-size: 14px;
            color: #a1a1aa;
        }

        .hint {
            margin-top: 12px;
            font-size: 12px;
            color: #8b5cf6; /* SYNTHIA Violet */
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="loading">Inicializando Motor 3D...</div>
    <div id="ui-layer">
        <h1>Bienvenida a Sphere OS™</h1>
        <p>Desliza para explorar la nueva dimensión.</p>
        <div class="hint">Interactúa con la pantalla</div>
    </div>
    <script type="module">
        import init from './out/onboarding_flipbook.js';
        init().then(() => {
            const loader = document.getElementById('loading');
            if(loader) loader.style.display = 'none';
        }).catch(console.error);
    </script>
</body>
</html>
