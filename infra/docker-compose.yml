##
## infra/docker-compose.yml — Synthia Control Room Production Infrastructure
## PATCH_002_SYNTHIA_CONTROL_ROOM_PRODUCTION
##
## Services:
##   traefik        — reverse proxy + ForwardAuth middleware
##   keycloak       — OIDC identity provider (optional — can substitute oauth2-proxy OIDC)
##   oauth2-proxy   — ForwardAuth gatekeeper for Dify / Langfuse / Open WebUI
##   postgres       — shared Postgres for control-room, Langfuse, Keycloak
##   redis          — session store for oauth2-proxy and caching
##   dify-api       — Dify API backend (official image)
##   dify-web       — Dify frontend (official image)
##   langfuse       — Langfuse observability (official image)
##   open-webui     — Open WebUI (optional, official image)
##
## Prerequisites:
##   - Copy infra/.env.example to infra/.env and fill all required values.
##   - Do NOT commit infra/.env. It contains secrets.
##
## Usage:
##   cd infra
##   cp .env.example .env && nano .env
##   docker compose up -d
##
## Network:
##   All services share the "internal" bridge network.
##   Only traefik exposes ports 80/443 externally.
##   Keycloak port 8080 is exposed for initial realm setup only;
##   remove the ports mapping after setup is complete.
##

version: '3.9'

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
  dify_storage:

# ── Traefik ────────────────────────────────────────────────────────────────────
services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/etc/traefik/acme.json"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
      - "./traefik/acme.json:/etc/traefik/acme.json"
    networks:
      - internal
    labels:
      - "traefik.enable=true"

# ── Postgres ───────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-control_room}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Redis ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Keycloak ───────────────────────────────────────────────────────────────────
# Official image: https://www.keycloak.org/
# Admin UI available at http://localhost:8080 during initial setup only.
# Create realm "synthia", configure Google as identity provider,
# then add client for oauth2-proxy (client_id + client_secret).
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-control_room}
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-keycloak.${BASE_DOMAIN}}
    command: start
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Remove after initial realm setup
      - "8080:8080"
    networks:
      - internal
    volumes:
      - keycloak_data:/opt/keycloak/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.${BASE_DOMAIN}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=le"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

# ── oauth2-proxy ───────────────────────────────────────────────────────────────
# Official docs: https://oauth2-proxy.github.io/oauth2-proxy/
# Protects Dify, Langfuse, Open WebUI via Traefik ForwardAuth.
# OIDC provider: Keycloak realm "synthia" or direct Google OIDC.
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: ${OAUTH2_PROXY_PROVIDER:-oidc}
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OAUTH2_PROXY_OIDC_ISSUER_URL:-https://keycloak.${BASE_DOMAIN}/realms/${KEYCLOAK_REALM}}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_DOMAIN: ${BASE_DOMAIN}
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_REDIRECT_URL: https://auth.${BASE_DOMAIN}/oauth2/callback
      OAUTH2_PROXY_UPSTREAMS: "static://202"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_SESSION_STORE_TYPE: redis
      OAUTH2_PROXY_REDIS_CONNECTION_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - redis
      - keycloak
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oauth2-proxy.rule=Host(`auth.${BASE_DOMAIN}`)"
      - "traefik.http.routers.oauth2-proxy.entrypoints=websecure"
      - "traefik.http.routers.oauth2-proxy.tls.certresolver=le"
      - "traefik.http.services.oauth2-proxy.loadbalancer.server.port=4180"

# ── Dify API ───────────────────────────────────────────────────────────────────
# Official docs: https://docs.dify.ai/en/self-host/quick-start/docker-compose
# NOTE: For full Dify deployment (worker, sandbox, nginx, weaviate, etc.),
# clone the official dify repo: git clone https://github.com/langgenius/dify.git
# and use infra/vendor/dify/ per the vendor notes in infra/README.md.
# This is a minimal API-only stub for reference routing only.
  dify-api:
    image: langgenius/dify-api:0.9.0
    restart: unless-stopped
    environment:
      MODE: api
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DIFY_DB:-dify}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STORAGE_TYPE: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - dify_storage:/app/api/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dify.rule=Host(`dify.${BASE_DOMAIN}`)"
      - "traefik.http.routers.dify.entrypoints=websecure"
      - "traefik.http.routers.dify.tls.certresolver=le"
      - "traefik.http.routers.dify.middlewares=oauth2-proxy-forwardauth"
      - "traefik.http.services.dify.loadbalancer.server.port=5001"

# ── Langfuse ───────────────────────────────────────────────────────────────────
# Official docs: https://langfuse.com/self-hosting/deployment/docker-compose
  langfuse:
    image: langfuse/langfuse:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${LANGFUSE_DB:-langfuse}
      NEXTAUTH_URL: https://langfuse.${BASE_DOMAIN}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.langfuse.rule=Host(`langfuse.${BASE_DOMAIN}`)"
      - "traefik.http.routers.langfuse.entrypoints=websecure"
      - "traefik.http.routers.langfuse.tls.certresolver=le"
      - "traefik.http.routers.langfuse.middlewares=oauth2-proxy-forwardauth"
      - "traefik.http.services.langfuse.loadbalancer.server.port=3000"

# ── Open WebUI (optional) ──────────────────────────────────────────────────────
# Official docs: https://docs.openwebui.com/getting-started/quick-start/
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: ""
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`chat.${BASE_DOMAIN}`)"
      - "traefik.http.routers.openwebui.entrypoints=websecure"
      - "traefik.http.routers.openwebui.tls.certresolver=le"
      - "traefik.http.routers.openwebui.middlewares=oauth2-proxy-forwardauth"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
