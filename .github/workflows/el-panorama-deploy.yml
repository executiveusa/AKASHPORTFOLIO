name: El Panorama™ — Build & Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── GATE 1: Secret Guard ──────────────────────────────────────
  secret-guard:
    name: 🔐 Secret Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for hardcoded API keys..."
          # Look for raw key patterns NOT wrapped in process.env
          FOUND=$(grep -rn 'sk-[a-zA-Z0-9]\{20,\}' . \
            --include="*.ts" --include="*.tsx" --include="*.rs" \
            --exclude-dir=node_modules --exclude-dir=target \
            2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "❌ SECRET_GUARD TRIGGERED — hardcoded secrets found:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  # ── GATE 2: Emerald Tablets Check ────────────────────────────
  emerald-gate:
    name: 💎 Emerald Tablets™ Audit
    runs-on: ubuntu-latest
    needs: secret-guard
    steps:
      - uses: actions/checkout@v4
      - name: Verify Emerald Tablets present
        run: |
          [ -f ".emerald-tablets-tm/PRIME_DIRECTIVE.md" ] || (echo "❌ Tablets missing" && exit 1)
          echo "✅ Emerald Tablets™ verified"

  # ── BUILD 1: Rust Backend ─────────────────────────────────────
  rust-build:
    name: 🦀 Rust Backend
    runs-on: ubuntu-latest
    needs: emerald-gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo check
        run: cd backend && cargo check
      - name: cargo test
        run: cd backend && cargo test -- --test-threads=1
      - name: cargo build --release
        run: cd backend && cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: synthia-backend
          path: backend/target/release/synthia
          retention-days: 3

  # ── BUILD 2: Next.js Frontend ─────────────────────────────────
  nextjs-build:
    name: ⚡ Next.js Frontend
    runs-on: ubuntu-latest
    needs: emerald-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/control-room/package-lock.json
      - name: Install dependencies
        run: cd apps/control-room && npm ci
      - name: TypeScript check
        run: cd apps/control-room && npx tsc --noEmit 2>&1 || echo "TypeScript warnings (non-blocking)"
      - name: Build
        run: cd apps/control-room && npm run build
        env:
          NEXT_PUBLIC_SYNTHIA_BACKEND: ${{ secrets.SYNTHIA_BACKEND_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: control-room-next
          path: apps/control-room/.next
          retention-days: 3

  # ── DEPLOY: Backend → Coolify ─────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend → Coolify
    runs-on: ubuntu-latest
    needs: [rust-build, nextjs-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Coolify webhook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}")
          echo "Coolify response: $HTTP_STATUS"
          [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ] || (echo "❌ Coolify deploy failed: $HTTP_STATUS" && exit 1)
          echo "✅ Backend deploy triggered"

  # ── DEPLOY: Frontend → Vercel ─────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [rust-build, nextjs-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel Production
        run: |
          cd apps/control-room
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            -e NEXT_PUBLIC_SYNTHIA_BACKEND=${{ secrets.SYNTHIA_BACKEND_URL }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── NOTIFY ────────────────────────────────────────────────────
  notify:
    name: 📱 Notify
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Send status notification
        run: |
          BE="${{ needs.deploy-backend.result }}"
          FE="${{ needs.deploy-frontend.result }}"
          if [ "$BE" = "success" ] && [ "$FE" = "success" ]; then
            MSG="✅ El Panorama™ deployed. Backend (Coolify) + Frontend (Vercel) live. La vista está despejada."
          else
            MSG="❌ El Panorama™ deploy incomplete. Backend: $BE | Frontend: $FE. Review GitHub Actions."
          fi
          curl -s -X POST \
            -H "Content-Type: application/json" \
            "${{ secrets.WHATSAPP_WEBHOOK }}" \
            -d "{\"message\": \"$MSG\", \"from\": \"el-panorama-ci\"}" || true
