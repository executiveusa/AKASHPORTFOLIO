name: onboarding-flipbook WASM Build + E2E

on:
  push:
    branches: [main]
    paths:
      - 'apps/onboarding-flipbook/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/onboarding-flipbook/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: apps/onboarding-flipbook

jobs:
  build-wasm:
    name: Compile Rust → WASM + E2E
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Rust toolchain + wasm32 target
      # ----------------------------------------------------------------
      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # ----------------------------------------------------------------
      # 3. Cargo cache (registry + git sources + compiled target)
      # ----------------------------------------------------------------
      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/onboarding-flipbook/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/onboarding-flipbook/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ----------------------------------------------------------------
      # 4. Install wasm-bindgen-cli (locked version matches Cargo.lock)
      # ----------------------------------------------------------------
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.93 --locked

      # ----------------------------------------------------------------
      # 5. Compile to WASM
      # ----------------------------------------------------------------
      - name: Build WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release

      # ----------------------------------------------------------------
      # 6. Generate JS bindings with wasm-bindgen
      # ----------------------------------------------------------------
      - name: Generate wasm-bindgen JS bindings
        run: |
          mkdir -p out
          wasm-bindgen \
            target/wasm32-unknown-unknown/release/onboarding_flipbook.wasm \
            --out-dir out \
            --target web \
            --no-typescript

      # ----------------------------------------------------------------
      # 7. Node + Playwright E2E
      # ----------------------------------------------------------------
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/onboarding-flipbook/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Serve static + run E2E tests
        run: npm run test:e2e

      # ----------------------------------------------------------------
      # 8. Upload compiled WASM artifact (available for 7 days)
      # ----------------------------------------------------------------
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: onboarding-flipbook-wasm-${{ github.sha }}
          path: apps/onboarding-flipbook/out/
          retention-days: 7
